pipeline_id: aging-aircraft-index-demo
governing_model_version: xyz-dsm-0.4
created: 2026-05-14
author: Luke Haider
status: demonstration
application_context: MIT Applied Agentic AI capstone

description: >
  Demonstration governing manifest for the Aging Aircraft Index (AAI)
  agentic system. This manifest illustrates how the XYZ Decision Space
  Model can govern semantic input treatment across retrieval,
  normalization, deduplication, clustering, health scoring, report
  generation, and verification agents.

thresholds:
  max_aas: 0.65
  max_ars: 0.55
  max_governance_pressure: 0.50
  halt_on_violation: true

elements:
  - id: raw_tod_log
    label: Raw Top of Descent Machine Log
    description: Machine-generated report used as source evidence.

  - id: pilot_eod_report
    label: Pilot End-of-Day Report
    description: Pilot-submitted narrative report of aircraft behavior or operational issues.

  - id: maintenance_eod_report
    label: Maintenance End-of-Day Report
    description: Maintenance-submitted report describing troubleshooting, inspection, or resolution status.

  - id: source_timestamp
    label: Source Timestamp
    description: Date/time or reporting period associated with a source record.

  - id: aircraft_identifier
    label: Aircraft Identifier
    description: Aircraft registration, fleet identifier, or aircraft-specific reference.

  - id: message_id
    label: Message ID
    description: Machine-generated system message identifier.

  - id: ata_classification
    label: ATA Classification
    description: Aircraft system classification, either source-provided or inferred.

  - id: normalized_event_record
    label: Normalized Event Record
    description: Agent-created structured event object derived from one or more source records.

  - id: source_evidence_link
    label: Source Evidence Link
    description: Link or reference back to raw source records.

  - id: deduplication_link
    label: Deduplication Link
    description: Agent-created relationship between records believed to refer to the same event.

  - id: cluster_id
    label: Reliability Cluster ID
    description: Agent-created identifier for a cluster of related events.

  - id: cluster_summary
    label: Cluster Summary
    description: Agent-generated summary of related events and recurrence pattern.

  - id: recurrence_count
    label: Recurrence Count
    description: Computed count of related events in a defined lookback window.

  - id: discrepancy_status
    label: Discrepancy Status
    description: Active, resolved, monitoring, unknown, or inferred status.

  - id: maintenance_resolution_evidence
    label: Maintenance Resolution Evidence
    description: Evidence from maintenance records supporting resolution or closure.

  - id: aircraft_health_score
    label: Aircraft Health Score
    description: Agent-generated aircraft health score.

  - id: score_rationale
    label: Score Rationale
    description: Agent-generated explanation of aircraft health score drivers.

  - id: monitoring_recommendation
    label: Monitoring Recommendation
    description: Agent-generated recommendation to monitor, escalate, or close an issue.

  - id: final_aai_report
    label: Final AAI Report
    description: Human-readable aircraft health report generated by the report agent.

agent_bindings:
  - agent_id: retrieval_agent
    agent_label: AAI Data Retrieval Agent
    bindings:
      - element_id: raw_tod_log
        coordinates: { x: -1.0, y: 0.8, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Preserve as source evidence. Do not rewrite, summarize, or alter raw value.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: pilot_eod_report
        coordinates: { x: -0.6, y: 0.6, z: 0.7 }
        posture: ANCHORED
        semantic_permission: Use as source narrative. May interpret later, but retrieval agent must preserve original text.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: maintenance_eod_report
        coordinates: { x: -0.7, y: 0.7, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Preserve maintenance source text and status exactly as retrieved.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: source_timestamp
        coordinates: { x: -1.0, y: 1.0, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Preserve timestamp exactly as source metadata.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: aircraft_identifier
        coordinates: { x: -1.0, y: 1.0, z: 1.0 }
        posture: IMMUTABLE
        semantic_permission: Preserve aircraft identifier exactly.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

  - agent_id: normalization_agent
    agent_label: AAI Normalization Agent
    bindings:
      - element_id: raw_tod_log
        coordinates: { x: -1.0, y: 0.8, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Use as fixed source evidence. Do not alter raw content.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: message_id
        coordinates: { x: -1.0, y: 1.0, z: 0.7 }
        posture: IMMUTABLE
        semantic_permission: Preserve source message identifier exactly.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: ata_classification
        coordinates: { x: 0.2, y: 0.4, z: 0.6 }
        posture: NEGOTIABLE
        semantic_permission: May infer ATA classification if not source-provided. Flag uncertainty when inferred.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Must distinguish source-provided classification from inferred classification.
        audit_level: SUMMARY

      - element_id: normalized_event_record
        coordinates: { x: 0.6, y: 0.5, z: 0.7 }
        posture: AGENT_OWNED
        semantic_permission: Create structured event record from governed source elements.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Must preserve source evidence links.
        audit_level: FULL

      - element_id: source_evidence_link
        coordinates: { x: -1.0, y: 1.0, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Preserve source reference and carry downstream.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

  - agent_id: health_scoring_agent
    agent_label: AAI Aircraft Health Scoring Agent
    bindings:
      - element_id: cluster_summary
        coordinates: { x: -0.2, y: 0.4, z: 0.8 }
        posture: NEGOTIABLE
        semantic_permission: Weigh cluster summary as analytical input. Preserve evidence references.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: May weigh, not erase, cluster evidence.
        audit_level: FULL

      - element_id: maintenance_resolution_evidence
        coordinates: { x: -0.6, y: 0.5, z: 0.9 }
        posture: ANCHORED
        semantic_permission: Use as authoritative maintenance context. Do not infer closure beyond documented evidence.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: discrepancy_status
        coordinates: { x: -0.3, y: 0.4, z: 0.9 }
        posture: ANCHORED
        semantic_permission: Preserve maintenance-confirmed status. If inferred, label as inferred.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: May infer only when explicitly labeled as inferred.
        audit_level: FULL

      - element_id: aircraft_health_score
        coordinates: { x: 0.7, y: 0.3, z: 0.9 }
        posture: AGENT_OWNED
        semantic_permission: Generate aircraft health score with evidence-based rationale.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Score must include supporting clusters and confidence notes.
        audit_level: FULL

      - element_id: score_rationale
        coordinates: { x: 0.6, y: 0.3, z: 0.8 }
        posture: AGENT_OWNED
        semantic_permission: Explain score drivers and evidence basis.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Must cite contributing clusters and source evidence.
        audit_level: FULL

  - agent_id: report_generation_agent
    agent_label: AAI Report Generation Agent
    bindings:
      - element_id: aircraft_health_score
        coordinates: { x: -0.4, y: 0.5, z: 0.8 }
        posture: ANCHORED
        semantic_permission: Explain and present score. Do not silently change value.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: Formatting allowed; score change not allowed.
        audit_level: FULL

      - element_id: source_evidence_link
        coordinates: { x: -1.0, y: 1.0, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Preserve source evidence references in report.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: final_aai_report
        coordinates: { x: 0.6, y: 0.4, z: 0.7 }
        posture: AGENT_OWNED
        semantic_permission: Generate final report using governed inputs and evidence references.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Must distinguish source evidence from agent-generated conclusions.
        audit_level: FULL

  - agent_id: verification_gate
    agent_label: AAI Verification Gate
    bindings:
      - element_id: raw_tod_log
        coordinates: { x: -1.0, y: 0.8, z: 0.8 }
        posture: IMMUTABLE
        semantic_permission: Verify source value has not been altered.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: aircraft_health_score
        coordinates: { x: -0.5, y: 0.5, z: 0.9 }
        posture: ANCHORED
        semantic_permission: Verify score has evidence basis and was not altered after scoring.
        verification:
          method: hash_validation
          max_age_seconds: 0
          action_on_stale: HALT
        override_conditions: NONE
        audit_level: FULL

      - element_id: final_aai_report
        coordinates: { x: -0.4, y: 0.4, z: 0.8 }
        posture: ANCHORED
        semantic_permission: Verify report preserves evidence, confidence, and distinction between source and inference.
        verification:
          method: none
          max_age_seconds: 0
          action_on_stale: FLAG_PROVISIONAL
        override_conditions: Human review required before operational use.
        audit_level: FULL

compliance_rules:
  - element_id: raw_tod_log
    checks:
      - type: no_source_rewrite
        description: Raw machine-generated source text must not be altered.
      - type: preserve_source_link
        description: Raw source record must remain traceable through downstream outputs.

  - element_id: pilot_eod_report
    checks:
      - type: no_source_rewrite
        description: Pilot narrative must not be silently rewritten.
      - type: preserve_source_link
        description: Pilot report must remain linked to derived event records.

  - element_id: maintenance_eod_report
    checks:
      - type: no_source_rewrite
        description: Maintenance narrative and status text must not be silently rewritten.
      - type: no_unsupported_resolution
        description: Resolution status cannot be inferred without maintenance evidence.

  - element_id: ata_classification
    checks:
      - type: flag_inferred_ata
        description: Inferred ATA classifications must be labeled as inferred.

  - element_id: normalized_event_record
    checks:
      - type: preserve_source_link
        description: Normalized event records must retain source references.

  - element_id: aircraft_health_score
    checks:
      - type: evidence_required_for_score
        description: Health score must include supporting clusters and source references.

  - element_id: final_aai_report
    checks:
      - type: distinguish_source_from_inference
        description: Report must distinguish raw evidence, derived structure, and agent conclusions.
      - type: preserve_source_link
        description: Report must preserve source evidence links for key claims.
